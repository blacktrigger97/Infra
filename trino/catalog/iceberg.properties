connector.name=iceberg

# Iceberg Catalog Configuration
iceberg.file-format=PARQUET
iceberg.catalog.type=rest
iceberg.rest-catalog.warehouse=s3://warehouse/


# Polaris Configuration
iceberg.rest-catalog.uri=http://polaris.bdc.home:8181/api/catalog/
iceberg.rest-catalog.warehouse=polaris
iceberg.rest-catalog.vended-credentials-enabled=true
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.credential=root:abcd1234
iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL


# Nessie Configuration
# iceberg.rest-catalog.uri=http://nessie.bdc.home:19120/iceberg
# iceberg.rest-catalog.prefix=main


# S3 Configuration
fs.native-s3.enabled=true
s3.aws-access-key=admin
s3.aws-secret-key=abcd1234
s3.endpoint=http://nginx-lb.bdc.home:9000
s3.path-style-access=true
s3.region=us-east-1
