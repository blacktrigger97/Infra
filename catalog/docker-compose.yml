networks:
  bdCluster:
    name: bdCluster
    driver: ipvlan
    external: true
    driver_opts:
      parent: ${ETHERNET_NAME}
    ipam:
      config:
        - subnet: 192.168.1.0/24
          ip_range: 192.168.1.0/24
          gateway: 192.168.1.1

services:

  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest # Must support JDBC
    container_name: polaris-bootstrap
    environment:
      - quarkus.datasource.db-kind=postgresql
      - quarkus.datasource.username=${DOCKER_USR}
      - quarkus.datasource.password=${DOCKER_PASS}
      - quarkus.datasource.jdbc.url=jdbc:postgresql://postgresql.bdc.home:5432/bdc?currentSchema=polaris
      - quarkus.datasource.jdbc.acquisition-timeout=30s
    command: ["bootstrap", "-r", "POLARIS", "-c", "POLARIS,${DOCKER_USR},${DOCKER_PASS}"]


  polaris:
    image: apache/polaris:latest
    container_name: polaris
    hostname: polaris.bdc.home
    platform: linux/amd64
    ports:
      - 8181:8181
      - 8182:8182
    restart: unless-stopped
    networks:
      bdCluster:
        ipv4_address: 192.168.1.30
    environment:
      - TZ=Asia/Kolkata
      - polaris.bootstrap=true
      - polaris.persistence.type=relational-jdbc
      - quarkus.datasource.db-kind=postgresql
      - quarkus.datasource.username=${DOCKER_USR}
      - quarkus.datasource.password=${DOCKER_PASS}
      - quarkus.datasource.jdbc.url=jdbc:postgresql://postgresql.bdc.home:5432/bdc?currentSchema=polaris
      - AWS_ACCESS_KEY_ID=${DOCKER_USR}
      - AWS_SECRET_ACCESS_KEY=${DOCKER_PASS}
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL_S3=${MINIO_ENDPOINT}
      - AWS_ENDPOINT_URL_STS=${MINIO_ENDPOINT}
      - polaris.bootstrap.credentials=POLARIS,${DOCKER_USR},${DOCKER_PASS}
      - polaris.realm-context.realms=POLARIS
      - polaris.features.DROP_WITH_PURGE_ENABLED=true
      - polaris.features.QUERY_HISTORY_ENABLED=true
      - polaris.features.QUERY_HISTORY_RETENTION_DAYS=7
    depends_on:
      - polaris-bootstrap
    healthcheck:
      test: ["CMD", "curl", "-f", "http://polaris.bdc.home:8181/health"]
      interval: 5s
      timeout: 5s
      retries: 5
  

  polaris-ui:
    image: apache/polaris-console:latest
    container_name: polaris-ui
    hostname: polaris-ui.bdc.home
    restart: unless-stopped
    networks:
      bdCluster:
        ipv4_address: 192.168.1.37
    ports:
      - 8080:80
    environment:
      - VITE_POLARIS_API_URL=http://polaris.bdc.home:8181
      - VITE_POLARIS_REALM=POLARIS 
      - VITE_POLARIS_REALM_HEADER_NAME=Polaris-Realm                    # optional, defaults to "Polaris-Realm"
      - VITE_OAUTH_TOKEN_URL=http://polaris.bdc.home:8181/api/v1/oauth/tokens
      - VITE_OAUTH_CLIENT_ID=${DOCKER_USR}
      - VITE_OAUTH_CLIENT_SECRET=${DOCKER_PASS}


  nessie:
    image: ghcr.io/projectnessie/nessie:${NESSIE_VER}
    container_name: nessie
    hostname: nessie.bdc.home
    restart: unless-stopped
    networks:
      bdCluster:
        ipv4_address: 192.168.1.31
    ports:
      - 19120:19120
    environment:
      - TZ=Asia/Kolkata
      - quarkus.datasource.db-kind=postgresql
      - quarkus.datasource.jdbc.max-size=16
      - quarkus.datasource.username=${DOCKER_USR}
      - quarkus.datasource.password=${DOCKER_PASS}
      - quarkus.debug.print-startup-times=true
      - quarkus.profile=prod
      - quarkus.datasource.driver='org.postgresql.Driver'
      - quarkus.http.port=19120
      - quarkus.http.host=nessie.bdc.home
      - quarkus.datasource.jdbc.url=jdbc:postgresql://postgresql.bdc.home:5432/bdc?currentSchema=nessie
      - quarkus.oidc.enabled="false"
      - nessie.version.store.type=JDBC
      - nessie.catalog.default-warehouse=warehouse
      - nessie.catalog.warehouses.warehouse.location=s3://warehouse
      - nessie.catalog.service.s3.default-options.endpoint=${MINIO_ENDPOINT}
      - nessie.catalog.service.s3.default-options.path-style-access=true
      - nessie.catalog.service.s3.default-options.auth-type=STATIC
      - nessie.catalog.service.s3.default-options.region=us-east-1
      - nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      - nessie.catalog.secrets.access-key.name=admin
      - nessie.catalog.secrets.access-key.secret=${DOCKER_PASS}
      - nessie.server.authentication.enabled=false
